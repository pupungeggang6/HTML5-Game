<!DOCTYPE html>
<html>
    <canvas id="Screen"></canvas>
    <script>
        window.onload = main

        function main() {
            window.addEventListener('mouseup', () => {
                let a = 0

                let canvas = document.getElementById('Screen')
                let context = canvas.getContext('2d')
                context.fillRect(0, 0, 50, 50)
            }, false)
        }
    </script>
</html>
